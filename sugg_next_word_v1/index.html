<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next Word Prediction</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Layout wrapper ─────────────────────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 560px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    h1 {
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      margin-bottom: 0.35rem;
      color: #111;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 1.75rem;
    }

    /* ── Input row ───────────────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    #sentence-input {
      flex: 1;
      height: 42px;
      padding: 0 12px;
      font-size: 0.95rem;
      color: #111;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s;
    }

    #sentence-input:focus {
      border-color: #888;
    }

    /* Clear button */
    #clear-btn {
      height: 42px;
      padding: 0 16px;
      font-size: 0.85rem;
      color: #555;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
    }

    #clear-btn:hover {
      background: #f5f5f5;
      border-color: #aaa;
    }

    #clear-btn:active {
      background: #ebebeb;
    }

    /* ── Suggestions label ───────────────────────────────────────────────── */
    .suggestions-label {
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.6rem;
    }

    /* ── Suggestion buttons row ──────────────────────────────────────────── */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 42px;
    }

    .suggestion-btn {
      height: 42px;
      padding: 0 20px;
      font-size: 0.9rem;
      color: #111;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .suggestion-btn:hover {
      background: #f5f5f5;
      border-color: #999;
    }

    .suggestion-btn:active {
      background: #ebebeb;
    }

    /* ── Loading state ───────────────────────────────────────────────────── */
    .suggestion-btn.loading {
      color: #ccc;
      border-color: #e8e8e8;
      cursor: default;
      pointer-events: none;
    }

    /* ── Status / error ─────────────────────────────────────────────────── */
    .status {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #aaa;
      min-height: 1.2em;
    }

    .status.error { color: #c0392b; }

    /* ── Divider ─────────────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 1.5rem 0;
    }

    /* ── History ─────────────────────────────────────────────────────────── */
    .history-label {
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
    }

    #history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #history-list li {
      font-size: 0.82rem;
      color: #bbb;
      padding: 2px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    #history-list li:last-child { border-bottom: none; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 400px) {
      .suggestion-btn { padding: 0 14px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Next Word Prediction</h1>
  <p class="subtitle">Type a phrase, then click a suggestion to extend it.</p>

  <!-- ── Input + Clear ─────────────────────────────────────────────────── -->
  <div class="input-row">
    <input
      type="text"
      id="sentence-input"
      placeholder="Start typing a sentence…"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="clear-btn">Clear</button>
  </div>

  <!-- ── Suggestions ───────────────────────────────────────────────────── -->
  <div class="suggestions-label">Suggestions</div>
  <div class="suggestions" id="suggestions">
    <!-- Populated by JS -->
  </div>

  <p class="status" id="status"></p>

  <!-- ── Word history ───────────────────────────────────────────────────── -->
  <hr class="divider" id="history-divider" style="display:none;" />
  <div id="history-section" style="display:none;">
    <div class="history-label">Words added</div>
    <ul id="history-list"></ul>
  </div>

</div>

<script>
  /* ── Config ─────────────────────────────────────────────────────────── */
  const API_URL = "http://localhost:5000/predict";
  const DEBOUNCE_MS = 350;   // Wait this long after typing stops before fetching

  /* ── DOM refs ───────────────────────────────────────────────────────── */
  const input       = document.getElementById("sentence-input");
  const suggestBox  = document.getElementById("suggestions");
  const statusEl    = document.getElementById("status");
  const clearBtn    = document.getElementById("clear-btn");
  const historyList = document.getElementById("history-list");
  const historyDiv  = document.getElementById("history-section");
  const historyHr   = document.getElementById("history-divider");

  /* ── State ──────────────────────────────────────────────────────────── */
  let debounceTimer = null;
  let wordHistory   = [];

  /* ── Render three placeholder "loading" buttons ─────────────────────── */
  function showLoadingState() {
    suggestBox.innerHTML = ["…", "…", "…"]
      .map(() => `<button class="suggestion-btn loading" disabled>…</button>`)
      .join("");
  }

  /* ── Render suggestion buttons ──────────────────────────────────────── */
  function renderSuggestions(words) {
    if (!words || words.length === 0) {
      suggestBox.innerHTML = "";
      return;
    }

    suggestBox.innerHTML = words
      .map(word => `<button class="suggestion-btn" data-word="${escapeHtml(word)}">${escapeHtml(word)}</button>`)
      .join("");

    // Attach click handlers
    suggestBox.querySelectorAll(".suggestion-btn").forEach(btn => {
      btn.addEventListener("click", () => onSuggestionClick(btn.dataset.word));
    });
  }

  /* ── Handle suggestion click ────────────────────────────────────────── */
  function onSuggestionClick(word) {
    // Append word to input (space-separated)
    const current = input.value.trimEnd();
    input.value = current ? current + " " + word : word;

    // Record in history
    wordHistory.push(word);
    renderHistory();

    // Fetch new suggestions for the updated sentence
    fetchSuggestions(input.value);

    // Keep focus on input for keyboard users
    input.focus();
  }

  /* ── Fetch predictions from backend ────────────────────────────────── */
  async function fetchSuggestions(text) {
    const trimmed = text.trim();

    if (!trimmed) {
      suggestBox.innerHTML = "";
      setStatus("");
      return;
    }

    showLoadingState();
    setStatus("");

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: trimmed }),
      });

      if (!response.ok) {
        throw new Error(`Server returned ${response.status}`);
      }

      const data = await response.json();

      if (data.error) {
        throw new Error(data.error);
      }

      renderSuggestions(data.predictions || []);

    } catch (err) {
      suggestBox.innerHTML = "";
      setStatus("Could not reach prediction server. Is Flask running?", true);
      console.error("[predict]", err);
    }
  }

  /* ── Debounced input handler ─────────────────────────────────────────── */
  input.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      fetchSuggestions(input.value);
    }, DEBOUNCE_MS);
  });

  /* ── "Enter" key immediately triggers fetch ─────────────────────────── */
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      clearTimeout(debounceTimer);
      fetchSuggestions(input.value);
    }
  });

  /* ── Clear button ────────────────────────────────────────────────────── */
  clearBtn.addEventListener("click", () => {
    input.value   = "";
    wordHistory   = [];
    suggestBox.innerHTML = "";
    historyList.innerHTML = "";
    historyDiv.style.display = "none";
    historyHr.style.display  = "none";
    setStatus("");
    input.focus();
  });

  /* ── History renderer ────────────────────────────────────────────────── */
  function renderHistory() {
    if (wordHistory.length === 0) {
      historyDiv.style.display = "none";
      historyHr.style.display  = "none";
      return;
    }

    historyDiv.style.display = "block";
    historyHr.style.display  = "block";

    // Show last 5 words added, most recent first
    const recent = [...wordHistory].reverse().slice(0, 5);
    historyList.innerHTML = recent
      .map(w => `<li>${escapeHtml(w)}</li>`)
      .join("");
  }

  /* ── Status helper ───────────────────────────────────────────────────── */
  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.className = "status" + (isError ? " error" : "");
  }

  /* ── XSS-safe HTML escape ────────────────────────────────────────────── */
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>

</body>
</html>
